<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Fun Time Quiz</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #0ea5e9;
      --correct: #16a34a;
      --wrong: #dc2626;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 40px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

     .leaderboard-box {
      margin-top: 20px;
      padding: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
       text-align: left;
       }

      .leaderboard-box h3 {
      margin: 0 0 12px;
       }

       #leaderboardList {
        margin: 0;
       padding-left: 22px;
       }

       #leaderboardList li {
       margin-bottom: 8px;
       }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .header {
      padding: 28px 28px 12px;
      border-bottom: 1px solid var(--border);
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .content {
      padding: 28px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .pill {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.18);
      color: #bae6fd;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }

    .card {
      background: rgba(31, 41, 55, 0.7);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .progress {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.3s ease;
    }

    .question-text {
      font-size: clamp(22px, 3vw, 30px);
      margin: 0 0 18px;
      line-height: 1.2;
    }

    .audio-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 22px;
    }

    button {
      border: none;
      cursor: pointer;
      font: inherit;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { cursor: not-allowed; opacity: 0.65; }

    .primary-btn {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: white;
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: 700;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: 700;
      border: 1px solid var(--border);
    }

    .answers {
      display: grid;
      gap: 12px;
    }

    .answer-btn {
      text-align: left;
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 600;
    }

    .answer-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.09);
    }

    .answer-btn.correct {
      background: rgba(22, 163, 74, 0.18);
      border-color: rgba(22, 163, 74, 0.6);
      color: #dcfce7;
    }

    .answer-btn.wrong {
      background: rgba(220, 38, 38, 0.18);
      border-color: rgba(220, 38, 38, 0.6);
      color: #fee2e2;
    }

    .feedback {
      min-height: 28px;
      margin-top: 18px;
      font-size: 15px;
      font-weight: 700;
    }

    .feedback.correct { color: #86efac; }
    .feedback.wrong { color: #fca5a5; }

    .hidden { display: none; }

    .start-screen, .results-screen {
      text-align: center;
    }

    .start-screen p, .results-screen p {
      color: var(--muted);
      line-height: 1.6;
      max-width: 560px;
      margin: 0 auto 20px;
    }

    .big-score {
      font-size: clamp(48px, 8vw, 76px);
      line-height: 1;
      margin: 8px 0 12px;
      font-weight: 900;
    }

    .small-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 16px;
    }

    code.inline {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 8px;
      color: #e2e8f0;
    }

    @media (max-width: 640px) {
      .header, .content { padding: 20px; }
      .card { padding: 18px; }
      .question-meta { flex-direction: column; align-items: flex-start; }
      .audio-wrap { flex-direction: column; align-items: stretch; }
      .primary-btn, .secondary-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1 class="title">Dan's Fun Quiz</h1>
      <p class="subtitle">Super Fun Quiz I Promise.</p>
    </div>

    <div class="content">
      <div id="startScreen" class="start-screen card">
        <div class="pill-row">
        </div>
        <button id="startBtn" class="primary-btn">Start Quiz</button>
        <p class="small-note">Tip: Try Harder.</p>
      </div>

      <div id="quizScreen" class="hidden">
        <div class="question-meta">
          <div id="questionCount">Question 1 of 10</div>
          <div id="scoreCount">Score: 0</div>
        </div>
        <div class="progress">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <div class="card">
          <h2 id="questionText" class="question-text"></h2>
          <img id="questionImage" style="max-width:100%; border-radius:12px; margin-bottom:15px; display:none;">
          <div class="audio-wrap">
           <button id="playBtn" class="primary-btn">▶ Play Audio</button>
           <button id="pauseBtn" class="secondary-btn">⏸ Pause</button>
           <button id="replayBtn" class="secondary-btn">↺ Replay</button>
           <label for="volumeSlider" style="color: var(--muted); font-size: 14px;">Volume</label>
           <input id="volumeSlider" type="range" min="0" max="1" step="0.05" value="1">
           <audio id="audioPlayer" preload="auto"></audio>
          </div>

          <div id="answers" class="answers"></div>
          <div id="feedback" class="feedback"></div>
        </div>
      </div>

      <div id="resultsScreen" class="results-screen card hidden">
        <div class="pill-row" style="justify-content:center;">
          <div class="pill">Finished</div>
        </div>
        <p>You made it to the end.</p>
        <div id="finalScore" class="big-score">0/0</div>
        <p id="finalMessage"></p>
        
        <div class="leaderboard-box">
        <h3>Leaderboard</h3>
        <ol id="leaderboardList"></ol>
       </div>
        
        <button id="restartBtn" class="primary-btn">Play Again</button>
      </div>
    </div>
  </div>

  <script>
    /*
      =========================
      Get out of my code
      =========================
      1. Put your audio files inside a folder named: sounds
      2. Replace the sample questions below with your own
      3. For each question:
         - prompt: the text shown on screen
         - audio: path to your audio file
         - options: the 4 answer choices
         - answer: the exact correct answer text

      Example audio path:
      audio: "sounds/door-stuck.mp3"
    */

    const QUESTIONS = [
      {
        prompt: "What sound is this?",
        audio: "sounds/DMR.mp3",
        options: ["DMR", "3G ALE", "MPT1327", "Hytera"],
        answer: "DMR"
      },
      {
        prompt: "What sound is this?",
        audio: "sounds/DPMR.mp3",
        options: ["TETRAPOL", "DPMR", "OpenSky", "LTR Net"],
        answer: "DPMR"
      },
      {
        prompt: "What are you hearing?",
        audio: "sounds/EDACS_96.mp3",
        options: ["EDACS", "Motorola Type II", "P25 Phase 2", "Harris VIDA"],
        answer: "EDACS"
      },
      {
        prompt: "Guess the sound.",
        audio: "sounds/iDEN.mp3",
        options: ["TETRAPOL", "DPMR", "iDEN", "OpenSky"],
        answer: "iDEN"
      },
      {
        prompt: "Which sound is this?",
        audio: "sounds/MotorolaType2.mp3",
        options: ["EDACS", "DPMR", "3G ALE", "Motorola Type II"],
        answer: "Motorola Type II"
      },
      {
        prompt: "Name the sound effect.",
        audio: "sounds/MPT1327.mp3",
        options: ["3G ALE", "MPT-1327", "DPMR", "iDEN"],
        answer: "MPT-1327"
      },
      {
        prompt: "What is making this sound?",
        audio: "sounds/NXDN.mp3",
        options: ["NXDN", "Motorola Type II", "EDACS", "TETRAPOL"],
        answer: "NXDN"
      },
      {
        prompt: "Can you identify this sound?",
        audio: "sounds/P25.mp3",
        options: ["3G ALE", "P25 Phase 2", "P25", "DMR"],
        answer: "P25"
      },
      {
        prompt: "What sound are you hearing here?",
        audio: "sounds/TETRA.mp3",
        options: ["MPT-1327", "TETRA", "DPMR", "iDEN"],
        answer: "TETRA"
      },
      {
        prompt: "Pick the right answer for this clip.",
        audio: "sounds/Tetrapol.mp3",
        options: ["Motorola Type II", "Tetrapol", "EDACS", "DPMR"],
        answer: "Tetrapol"
      },
      {
        prompt: "Which option matches this sound?",
        audio: "sounds/DStar.mp3",
        options: ["D-Star", "EDACS", "DPMR", "TETRAPOL"],
        answer: "D-Star"
      },
      {
        prompt: "What is this audio clip?",
        audio: "sounds/8PSK.mp3",
        options: ["3G ALE", "EDACS", "8PSK", "DPMR"],
        answer: "8PSK"
      },
      {
        prompt: "Identify this radio protocol system.",
        image: "images/P25.jpg",
        options: ["P25", "DMR", "TETRA", "NXDN"],
        answer: "P25"
      },
      {
        prompt: "Which protocol is shown here?",
        image: "images/DMR.jpg",
        options: ["P25", "DMR", "EDACS", "LTR"],
        answer: "DMR"
      },
      {
        prompt: "What trunked radio system is this?",
        image: "images/TETRA.jpg",
        options: ["NXDN", "TETRA", "P25", "MPT-1327"],
        answer: "TETRA"
     },
     {
       prompt: "Identify the protocol from the image.",
       image: "images/NXDN.jpg",
       options: ["DMR", "NXDN", "P25", "OpenSky"],
       answer: "NXDN"
     }
    ];

    const QUESTIONS_PER_GAME = 8;

    const startScreen = document.getElementById("startScreen");
    const quizScreen = document.getElementById("quizScreen");
    const resultsScreen = document.getElementById("resultsScreen");

    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const replayBtn = document.getElementById("replayBtn");
    const volumeSlider = document.getElementById("volumeSlider");
    const audioWrap = document.querySelector(".audio-wrap");

    const questionCount = document.getElementById("questionCount");
    const scoreCount = document.getElementById("scoreCount");
    const progressBar = document.getElementById("progressBar");
    const questionText = document.getElementById("questionText");
    const questionImage = document.getElementById("questionImage");
    const answersEl = document.getElementById("answers");
    const feedbackEl = document.getElementById("feedback");
    const audioPlayer = document.getElementById("audioPlayer");
    audioPlayer.volume = 1;
    const finalScore = document.getElementById("finalScore");
    const finalMessage = document.getElementById("finalMessage");
    const leaderboardList = document.getElementById("leaderboardList");

    let gameQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    const firebaseConfig = {
  apiKey: "AIzaSyAOCKJbII7O7RRP5VdAJpSip8jMIpW72R0",
  authDomain: "quiz-7af2f.firebaseapp.com",
  projectId: "quiz-7af2f",
  storageBucket: "quiz-7af2f.firebasestorage.app",
  messagingSenderId: "553363353677",
  appId: "1:553363353677:web:908dd4fc0356b586062c04",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startGame() {
      if (QUESTIONS.length < QUESTIONS_PER_GAME) {
        alert(`You need at least ${QUESTIONS_PER_GAME} questions in the QUESTIONS array.`);
        return;
      }

      gameQuestions = shuffle(QUESTIONS).slice(0, QUESTIONS_PER_GAME);
      currentQuestionIndex = 0;
      score = 0;
      answered = false;

      startScreen.classList.add("hidden");
      resultsScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");

      renderQuestion();
    }

    function renderQuestion() {
      const question = gameQuestions[currentQuestionIndex];
      answered = false;
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      answersEl.innerHTML = "";

      questionCount.textContent = `Question ${currentQuestionIndex + 1} of ${gameQuestions.length}`;
      scoreCount.textContent = `Score: ${score}`;
      progressBar.style.width = `${((currentQuestionIndex) / gameQuestions.length) * 100}%`;
      questionText.textContent = question.prompt;

    if (question.image) {
      questionImage.src = question.image;
      questionImage.style.display = "block";
    } else {
     questionImage.style.display = "none";
     }

    if (question.audio) {
      audioWrap.style.display = "flex";
      audioPlayer.src = question.audio;
      audioPlayer.pause();
      audioPlayer.currentTime = 0;
    } else {
      audioWrap.style.display = "none";
      audioPlayer.pause();
      audioPlayer.removeAttribute("src");
      audioPlayer.load();
    }

      const shuffledOptions = shuffle(question.options);

      shuffledOptions.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = option;
        btn.addEventListener("click", () => handleAnswer(option, btn));
        answersEl.appendChild(btn);
      });
    }

    function handleAnswer(selectedOption, selectedButton) {
      if (answered) return;
      answered = true;

      const question = gameQuestions[currentQuestionIndex];
      const buttons = Array.from(document.querySelectorAll(".answer-btn"));

      buttons.forEach(button => {
        button.disabled = true;
        const optionText = button.textContent;

        if (optionText === question.answer) {
          button.classList.add("correct");
        }

        if (button === selectedButton && selectedOption !== question.answer) {
          button.classList.add("wrong");
        }
      });

      if (selectedOption === question.answer) {
        score += 1;
        scoreCount.textContent = `Score: ${score}`;
        feedbackEl.textContent = "Correct.";
        feedbackEl.className = "feedback correct";
      } else {
        feedbackEl.textContent = `Wrong. Correct answer: ${question.answer}`;
        feedbackEl.className = "feedback wrong";
      }

      setTimeout(() => {
        currentQuestionIndex += 1;
        if (currentQuestionIndex < gameQuestions.length) {
          renderQuestion();
        } else {
          showResults();
        }
      }, 1400);
    }

    async function showResults() {
    quizScreen.classList.add("hidden");
    resultsScreen.classList.remove("hidden");
    progressBar.style.width = "100%";
  finalScore.textContent = `${score}/${gameQuestions.length}`;

  const percentage = (score / gameQuestions.length) * 100;
  if (percentage === 100) {
    finalMessage.textContent = "Cheater.";
  } else if (percentage >= 75) {
    finalMessage.textContent = "Decent. You know your signals.";
  } else if (percentage >= 50) {
    finalMessage.textContent = "Not bad. Try again.";
  } else {
    finalMessage.textContent = "Bruh.";
  }

  const playerName = prompt("Enter your name for the leaderboard:");
      await saveScore(playerName, score, gameQuestions.length);
     await loadLeaderboard();
     }

    playBtn.addEventListener("click", () => {
     audioPlayer.play().catch(() => {
    alert("Audio could not play. Check that the file path is correct and the file exists.");
    });
   });

    pauseBtn.addEventListener("click", () => {
  audioPlayer.pause();
  });

  replayBtn.addEventListener("click", () => {
  audioPlayer.currentTime = 0;
  audioPlayer.play().catch(() => {
    alert("Audio could not play. Check that the file path is correct and the file exists.");
  });
});

volumeSlider.addEventListener("input", () => {
  audioPlayer.volume = volumeSlider.value;
});

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", startGame);

    loadLeaderboard();
    
  </script>
</body>
</html>
